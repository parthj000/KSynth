version: 2

project_name: ksynth

builds:
  - id: ksynth
    main: ./cmd/ksynth
    binary: ksynth
    targets:
      - linux_amd64
      - windows_amd64
      - windows_arm64

archives:
  - id: packages
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc

release:
  github:
    owner: parthj000
    name: KSynth
